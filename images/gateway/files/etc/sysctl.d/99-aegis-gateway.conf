# Aegis Gateway — kernel network hardening (spec §5, §10; Etap 1).
#
# Applied by systemd-sysctl BEFORE the firewall/network come up. Complements the
# nftables ruleset: disables IPv6 by default, forbids all redirects/source
# routing, and enables strict reverse-path filtering so no packet can take an
# unexpected path around the gateway. gateway-controller may relax net.ipv6.* only
# when Ipv6Policy::RouteThroughTunnel is selected AND the tunnel truly carries v6.

# --- IPv6 disabled by default (leak prevention) ------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 0
# If v6 is ever enabled per-interface, never autoconfigure or accept RAs.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.autoconf = 0
net.ipv6.conf.default.autoconf = 0

# --- No ICMP redirects (in or out); no source routing ------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# --- Strict reverse-path filtering (drop spoofed / asymmetric packets) --------
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# --- The gateway DOES route (browser subnet ↔ Tor termination) ---------------
# Forwarding is required for the two-NIC role; the nftables forward chain is what
# constrains it (default drop + no browser→WAN forwarding).
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 0

# --- General hardening --------------------------------------------------------
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.log_martians = 1
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
# No core dumps that could contain traffic/keys (spec §10).
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0
