# Aegis Browser VM — reproducible minimal Debian image (spec §4, §6, §10; Etap 2).
#
# The Browser VM is a hardened, headless-except-for-Chromium Linux workstation
# with EXACTLY ONE NIC (to the gateway). It has NO host integration whatsoever:
# no spice-vdagent, no qemu-guest-agent desktop bits, no shared folders, no
# clipboard/drag-and-drop, no USB/PCI passthrough. Root is read-only; /home,
# /tmp and /var/downloads are tmpfs/overlay so nothing persists across a session
# (spec §8 disposable profiles, §10 read-only root).
#
# Build (Linux host, mkosi >= 20):
#   cd images/browser && mkosi --image-version=1.0.0 --force build
# Output is converted to qcow2, hashed (SHA-256) and signed by the release
# pipeline; update-client verifies it; vm-controller uses it as a read-only
# backing image with a disposable overlay (see images/README.md).

[Distribution]
Distribution=debian
Release=bookworm
# Pin to a snapshot.debian.org mirror in CI for byte-reproducible package sets.
# Mirror=https://snapshot.debian.org/archive/debian/20260701T000000Z/

[Output]
Format=disk
ImageId=aegis-browser
Output=aegis-browser
CompressOutput=zstd

[Content]
Bootable=yes
Bootloader=systemd-boot
SourceDateEpoch=1735689600
# Minimal graphical surface: a bare Wayland/X kiosk that launches ONLY Chromium.
# We use a tiny compositor (cage — single-app Wayland kiosk) rather than a full
# desktop, so there is no file manager, terminal, or desktop integration.
# Chromium is the Debian package (real engine version in the UA — spec §6/§16).
Packages=
        systemd
        systemd-sysv
        udev
        dbus-broker
        chromium
        chromium-sandbox
        cage
        seatd
        libgl1-mesa-dri
        mesa-vulkan-drivers
        fonts-dejavu-core
        fonts-liberation2
        fonts-noto-core
        ca-certificates
        iproute2
        nftables
        libseccomp2
        # qemu-guest-agent kept ONLY for clean shutdown/fsfreeze; desktop RPCs
        # are stripped by the same lockdown drop-in used on the gateway.
        qemu-guest-agent

# EXPLICITLY NOT INSTALLED (host integration / leak surface):
#   spice-vdagent, spice-webdavd, xserver-xorg-video-qxl, open-vm-tools,
#   virtualbox-guest-*, samba/cifs-utils, network-manager, openssh-server.

RootPassword=!locked
Autologin=no
Hostname=aegis-browser
# Empty machine-id → randomized per instance on first boot (see README note).
MachineId=

# Curated /etc + policies tree (systemd units, firstboot, sysctl, seccomp,
# Chromium managed policies).
ExtraTrees=files

[Validation]
# CI: sign the produced image; SHA-256 + detached signature are what
# update-client verifies. See images/README.md.
# Checksum=yes
# Sign=yes

[Host]
QemuHeadless=yes
