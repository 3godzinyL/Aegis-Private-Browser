# Aegis Gateway VM — reproducible minimal Debian image (spec §4, §5, §10; Etap 1).
#
# The gateway is the ONLY VM with an upstream path to the host network. It runs
# a default-deny nftables firewall and routes every packet from the isolated
# Browser network through Tor (the first supported backend). If the tunnel drops
# the kill switch keeps the ruleset in a fail-closed state — the Browser VM is
# never allowed a direct connection (spec §16).
#
# Build (on a Linux host with mkosi >= 20 and systemd-repart):
#   cd images/gateway && mkosi --force build
# Output: mkosi.output/aegis-gateway_<version>.raw (converted to qcow2 by build.sh
# or the packaging/updater pipeline, then hashed + signed — see images/README.md).
#
# Reproducibility: SOURCE_DATE_EPOCH is honored, package versions are pinned by
# the snapshot mirror configured in the CI environment, and no host state leaks
# into the image (machine-id is left empty so systemd regenerates a random one on
# first boot — see files/etc/machine-id handling and the browser image note).

[Distribution]
Distribution=debian
Release=bookworm
# Pin to a snapshot.debian.org mirror in CI for byte-reproducible package sets.
# Mirror=https://snapshot.debian.org/archive/debian/20260701T000000Z/

[Output]
Format=disk
ImageId=aegis-gateway
# Deterministic output; the real version is stamped by the release pipeline.
# ImageVersion is passed on the command line: mkosi -O mkosi.output --image-version=1.0.0
Output=aegis-gateway
# Compress the shipped artifact; the qcow2 conversion happens in build.sh.
CompressOutput=zstd

[Content]
# Minimal, headless. No desktop, no X, no guest desktop-integration tools.
Bootable=yes
Bootloader=systemd-boot
# Deterministic clock for reproducible timestamps inside the image.
SourceDateEpoch=1735689600
# BASE SYSTEM + gateway role packages only. Explicitly NO:
#   spice-vdagent, qemu-guest-agent desktop bits, xorg, wayland, network-manager.
Packages=
        systemd
        systemd-sysv
        udev
        dbus-broker
        nftables
        tor
        iproute2
        iptables
        ca-certificates
        libcap2-bin
        less
        # qemu-guest-agent is included ONLY for clean ACPI shutdown from libvirt;
        # its desktop/clipboard/file-transfer integration is disabled via the
        # aegis-guest-agent drop-in (files/etc/systemd/system/qemu-guest-agent...).
        qemu-guest-agent

# Root is locked; the gateway is administered only over the libvirt console /
# management channel. No SSH server is installed (spec §5: gateway does not accept
# host-initiated traffic outside the management channel).
RootPassword=!locked
Autologin=no
Hostname=aegis-gateway
# Leave machine-id empty in the image → systemd writes "uninitialized" and
# regenerates a fresh random id on first boot; it is NOT derived from the host.
# (mkosi seeds an empty /etc/machine-id when this is set.)
MachineId=

# Overlay the curated /etc + /usr tree (systemd units, torrc, nftables ruleset,
# sysctl, health probe).
ExtraTrees=files

[Validation]
# In CI, enable signing of the produced image; the detached signature + SHA-256
# are what update-client verifies. Kept commented so local builds don't require a
# key. See images/README.md for the signing flow.
# SecureBoot=yes
# Checksum=yes
# Sign=yes

[Host]
# The gateway needs two NICs at RUNTIME (defined by the libvirt domain XML that
# vm-controller renders): upstream to the host NAT network, downstream to the
# isolated aegis network. The image itself is NIC-agnostic; systemd-networkd
# configures them by role via files/etc/systemd/network/*.network.
QemuHeadless=yes
