# cargo-deny configuration — dependency policy for Aegis (spec Etap 5: "skan zależności").
# Run: cargo deny check

[advisories]
version = 2
# Fail on any known security advisory in the dependency tree.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Only permissive + our own copyleft are allowed. Anything else fails CI and
# must be reviewed explicitly.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "GPL-3.0",
]
confidence-threshold = 0.9
exceptions = []

[bans]
# Fail the build on multiple major versions of security-sensitive crates so we
# don't accidentally link two different crypto stacks.
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Never allow an OpenSSL native dependency to sneak in; we standardize on
    # rustls / pure-Rust crypto.
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
