# Runtime + state directories for Aegis (systemd-tmpfiles).
#
# The runtime dir MUST be RAM-backed (it holds disposable qcow2 overlays and the
# in-RAM encryption keys of ephemeral sessions, spec §8). On most systems /run is
# already a tmpfs; we place the runtime dir there.
#
# Type Path                  Mode UID    GID    Age Argument
d      /run/aegis            0710 aegis  aegis  -   -
d      /run/aegis/overlays   0700 aegis  aegis  -   -
d      /var/lib/aegis        0750 aegis  aegis  -   -
d      /var/lib/aegis/profiles 0700 aegis aegis -   -
d      /var/lib/aegis/images 0755 aegis  aegis  -   -
d      /var/log/aegis        0750 aegis  aegis  -   -
