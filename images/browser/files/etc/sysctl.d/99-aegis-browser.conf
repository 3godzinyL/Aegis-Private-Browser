# Aegis Browser — kernel hardening (spec §5, §10; Etap 2).
#
# The Browser VM has ONE NIC and only reaches the gateway. IPv6 is disabled so no
# v6 traffic can bypass the gateway's route (spec §5, §14 "brak wycieku IPv6").
# The rest tightens the local kernel surface that malicious page content (running
# inside the renderer sandbox) might try to reach.

# --- IPv6 fully disabled (single-route containment) --------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# --- No redirects, no source routing, strict rp_filter -----------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.ip_forward = 0

# --- Local privilege / info-leak hardening -----------------------------------
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 2
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2
# User namespaces MUST stay enabled — Chromium's sandbox uses them. Do NOT set
# kernel.unprivileged_userns_clone = 0 here.

# --- No core dumps that could contain page data / session state (spec §10) ----
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0

# --- General ------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
